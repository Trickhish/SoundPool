<div class="content">
  <div class="playlists-wrap">

    <!-- Deezer section -->
    <section class="pl-section">
      <div class="section-head">
        <span class="section-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
        </span>
        <h2 class="section-title">Deezer</h2>
        <span *ngIf="!deezerLoading && deezerConnected" class="track-count">{{ deezerPlaylists.length }} playlists</span>
      </div>

      <!-- Loading -->
      <div *ngIf="deezerLoading" class="loading-row">
        <div class="spinner"></div>
        <span>Loading playlists…</span>
      </div>

      <!-- Not connected -->
      <div *ngIf="!deezerLoading && !deezerConnected" class="empty-state">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>Connect your Deezer account in <strong>Profile</strong> to see your playlists.</p>
      </div>

      <!-- Grid -->
      <div *ngIf="!deezerLoading && deezerConnected" class="pl-grid">
        <div *ngFor="let pl of deezerPlaylists" class="pl-card">
          <div class="pl-cover">
            <img *ngIf="pl.picture" [src]="pl.picture" [alt]="pl.title" />
            <div *ngIf="!pl.picture" class="pl-cover-placeholder">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
            </div>
          </div>
          <div class="pl-info">
            <span class="pl-title">{{ pl.title }}</span>
            <span class="pl-meta">{{ pl.nb_tracks }} tracks</span>
          </div>
        </div>
      </div>
    </section>

    <!-- SoundPool section -->
    <section class="pl-section">
      <div class="section-head">
        <span class="section-icon accent">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </span>
        <h2 class="section-title">SoundPool</h2>
      </div>

      <div class="empty-state">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <p>No playlists yet.</p>
        <button class="btn-accent" disabled>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New playlist
        </button>
      </div>
    </section>

  </div>
</div>
