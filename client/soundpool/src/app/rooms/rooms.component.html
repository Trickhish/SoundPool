<div class="rooms-page">
  <header class="rooms-head">
    <h1>Rooms</h1>
    <button class="new-room-btn" (click)="creating = !creating">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New room
    </button>
  </header>

  <div class="create-panel" *ngIf="creating">
    <input class="room-input" [(ngModel)]="newName" placeholder="Room name" (keyup.enter)="create()" />
    <input class="room-input" [(ngModel)]="newPassword" type="password" placeholder="Password (optional)" (keyup.enter)="create()" />
    <button class="create-go" (click)="create()" [disabled]="!newName.trim()">Create</button>
  </div>

  <div *ngIf="loading" class="rooms-loading">Loading rooms…</div>
  <div *ngIf="!loading && rooms.length === 0" class="rooms-empty">No rooms yet — create the first channel.</div>

  <div class="rooms-grid">
    <div *ngFor="let room of rooms" class="room-card" (click)="enter(room)">
      <div class="room-card-top">
        <span class="room-name">{{ room.name }}</span>
        <svg *ngIf="room.has_password" class="room-lock" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="room-meta">
        <span>{{ room.member_count }} member{{ room.member_count === 1 ? '' : 's' }}</span>
        <span *ngIf="room.rights?.is_admin" class="badge admin">Admin</span>
        <span *ngIf="room.is_member && !room.rights?.is_admin" class="badge member">Joined</span>
      </div>
      <div class="room-actions">
        <button class="enter-btn">{{ room.is_member ? 'Open' : 'Join' }}</button>
        <button *ngIf="room.is_member && !room.rights?.is_admin" class="leave-btn" (click)="leave(room, $event)">Leave</button>
      </div>
    </div>
  </div>
</div>
